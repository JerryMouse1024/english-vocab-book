<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>朗读自检页（与项目代码无关）</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 820px; margin: 40px auto; padding: 0 16px; color: #1e293b; }
    h1 { font-size: 20px; }
    .box { border: 1px solid #e2e8f0; border-radius: 10px; padding: 16px; margin: 16px 0; background: #f8fafc; }
    button { padding: 8px 16px; margin: 4px; border-radius: 8px; border: 1px solid #c7d2fe; background: #eef2ff; color: #4f46e5; cursor: pointer; font-size: 14px; }
    button:hover { background: #e0e7ff; }
    pre { background: #0f172a; color: #e2e8f0; padding: 12px; border-radius: 8px; overflow: auto; font-size: 13px; max-height: 320px; }
    .warn { color: #d97706; font-weight: 600; }
    .ok { color: #059669; font-weight: 600; }
    .err { color: #dc2626; font-weight: 600; }
    code { background: #e2e8f0; padding: 1px 5px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>🔊 朗读自检页（仅测试浏览器自身语音能力）</h1>
  <p>这个页面<strong>不涉及任何项目代码、不经过翻译平台</strong>，只调用浏览器原生的 <code>speechSynthesis</code>。
     如果这里也读不出声音，说明问题在浏览器/系统本身；如果这里能读出声，说明问题在我写的代码里。</p>

  <div class="box">
    <p>可用语音数量：<span id="voiceCount">检测中…</span></p>
    <div id="voiceList"></div>
  </div>

  <div class="box">
    <p>测试文本：<input id="text" value="How are you?" style="width:240px;padding:6px;" /></p>
    <button onclick="testDefault()">① 用默认语音朗读</button>
    <button onclick="testEnglish()">② 强制用英文语音朗读</button>
    <button onclick="stopAll()">■ 停止</button>
  </div>

  <div class="box">
    <strong>运行日志：</strong>
    <pre id="log"></pre>
  </div>

  <script>
    const logEl = document.getElementById('log');
    function log(msg, cls) {
      const line = document.createElement('div');
      if (cls) line.className = cls;
      line.textContent = (new Date()).toLocaleTimeString() + '  ' + msg;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    const synth = window.speechSynthesis;
    if (!synth) {
      log('❌ 当前浏览器不支持 speechSynthesis（Web Speech API）。请换 Chrome / Edge / Safari。', 'err');
    } else {
      log('✅ 浏览器支持 speechSynthesis。', 'ok');
    }

    let voices = [];
    function refreshVoices() {
      voices = synth.getVoices() || [];
      document.getElementById('voiceCount').textContent = voices.length;
      const list = document.getElementById('voiceList');
      list.innerHTML = '';
      if (voices.length === 0) {
        list.innerHTML = '<p class="warn">⚠️ 当前没有任何语音引擎！这是「朗读无声」的最常见原因——系统没装 TTS 语音（尤其中文 Windows 默认可能只有中文语音）。</p>';
        return;
      }
      const eng = voices.filter(v => /en/i.test(v.lang) || /english/i.test(v.name));
      list.innerHTML = '<p>共 ' + voices.length + ' 个语音，其中英文语音 ' + eng.length + ' 个。</p>' +
        '<ul style="margin:8px 0;padding-left:20px;font-size:13px;">' +
        voices.map(v => '<li>' + v.name + ' <span style="color:#64748b">(' + v.lang + (v.default ? ', 默认' : '') + ')</span></li>').join('') +
        '</ul>';
    }
    refreshVoices();
    if (synth.onvoiceschanged !== undefined) {
      synth.onvoiceschanged = refreshVoices;
    }

    function doSpeak(utterance, label) {
      // 先 resume 再 cancel 再 speak（经典修复顺序）
      try { synth.resume(); } catch(e) {}
      try { synth.cancel(); } catch(e) {}
      utterance.onstart = () => log('▶ [' + label + '] onstart 触发（开始发声）', 'ok');
      utterance.onend = () => log('■ [' + label + '] onend 触发（播放结束）');
      utterance.onerror = (e) => log('✗ [' + label + '] onerror: ' + (e.error || e.message || e), 'err');
      // 延迟一帧再 speak，规避 Chrome cancel→speak 丢字
      setTimeout(() => {
        try { synth.speak(utterance); log('📢 [' + label + '] 已调用 speak()'); }
        catch (e) { log('✗ [' + label + '] speak 抛异常: ' + e.message, 'err'); }
      }, 120);
    }

    function testDefault() {
      if (!synth) return;
      const text = document.getElementById('text').value;
      log('—— 测试①：默认语音 ——');
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US';
      doSpeak(u, '默认');
    }

    function testEnglish() {
      if (!synth) return;
      const text = document.getElementById('text').value;
      const eng = voices.find(v => /english/i.test(v.name)) || voices.find(v => /en/i.test(v.lang));
      if (!eng) {
        log('⚠️ 没找到英文语音，改用默认语音测试。', 'warn');
        return testDefault();
      }
      log('—— 测试②：强制英文语音 (' + eng.name + ') ——');
      const u = new SpeechSynthesisUtterance(text);
      u.voice = eng;
      u.lang = eng.lang;
      doSpeak(u, '英文');
    }

    function stopAll() {
      try { synth.cancel(); log('已停止'); } catch(e) {}
    }
  </script>
</body>
</html>
