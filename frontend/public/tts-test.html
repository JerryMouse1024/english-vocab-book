<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>朗读自检页</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 840px; margin: 36px auto; padding: 0 16px; color: #1e293b; }
    h1 { font-size: 20px; margin-bottom: 4px; }
    h2 { font-size: 16px; color: #64748b; font-weight: normal; margin-top: 0; }
    .box { border: 1px solid #e2e8f0; border-radius: 10px; padding: 16px; margin: 14px 0; background: #f8fafc; }
    button { padding: 8px 16px; margin: 4px; border-radius: 8px; border: 1px solid #c7d2fe; background: #eef2ff; color: #4f46e5; cursor: pointer; font-size: 14px; }
    button:hover { background: #e0e7ff; }
    .btn-green { background:#ecfdf5;border-color:#6ee7b7;color:#059669; }
    .btn-green:hover { background:#d1fae5; }
    pre { background: #0f172a; color: #e2e8f0; padding: 12px; border-radius: 8px; overflow: auto; font-size: 13px; max-height: 300px; }
    .warn { color: #d97706; font-weight: 600; }
    .ok { color: #059669; font-weight: 600; }
    .err { color: #dc2626; font-weight: 600; }
    code { background: #e2e8f0; padding: 1px 5px; border-radius: 4px; }
    .tag { display:inline-block;background:#eef2ff;color:#4f46e5;padding:2px 8px;border-radius:12px;font-size:12px;margin-right:6px;}
    input[type=text] { width:260px; padding:6px; border:1px solid #cbd5e1; border-radius:6px; }
  </style>
</head>
<body>
  <h1>🔊 朗读自检页</h1>
  <h2>两种朗读方式对比：浏览器 Web Speech API（不可靠）vs 在线 TTS 音频流（可靠）</h2>

  <div class="box">
    <p>可用语音数量：<span id="voiceCount">检测中…</span></p>
    <div id="voiceList"></div>
  </div>

  <div class="box">
    <p>测试文本：<input id="text" value="How are you?" /></p>

    <p><span class="tag">方式 A · 浏览器原生</span></p>
    <button onclick="testDefault()">A① 默认语音</button>
    <button onclick="testEnglish()">A② 英文语音</button>
    <button onclick="stopAll()">■ 停止 A</button>
    <p style="font-size:12px;color:#94a3b8;">→ 你之前的测试结果：每次 onerror interrupted，说明此方式在你的环境下不工作</p>

    <hr style="border:none;border-top:1px solid #e2e8f0;margin:14px 0;" />

    <p><span class="tag">方式 B · 在线TTS音频流</span></p>
    <button class="btn-green" onclick="testAudio()">B① 通过后端代理播放 MP3</button>
    <audio id="testAudio" controls style="width:280px;display:none;"></audio>
    <p style="font-size:12px;color:#059669;">→ 这是项目现在实际使用的方式，和单词发音一样用 &lt;audio&gt; 播放</p>
  </div>

  <div class="box">
    <strong>运行日志：</strong>
    <pre id="log"></pre>
  </div>

  <script>
    const logEl = document.getElementById('log');
    function log(msg, cls) {
      const line = document.createElement('div');
      if (cls) line.className = cls;
      line.textContent = (new Date()).toLocaleTimeString() + '  ' + msg;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // ========== 方式 A：Web Speech API ==========
    const synth = window.speechSynthesis;
    if (!synth) {
      log('❌ 浏览器不支持 speechSynthesis', 'err');
    } else {
      log('✅ 浏览器支持 speechSynthesis（方式 A 可用）', 'ok');
    }

    let voices = [];
    function refreshVoices() {
      voices = synth ? (synth.getVoices() || []) : [];
      document.getElementById('voiceCount').textContent = voices.length;
      const list = document.getElementById('voiceList');
      list.innerHTML = '';
      if (!voices.length) { list.innerHTML = '<p class="warn">⚠️ 无语音引擎</p>'; return; }
      const eng = voices.filter(v => /en/i.test(v.lang));
      list.innerHTML = '<p>' + voices.length + ' 个语音，英文 ' + eng.length + ' 个。</p><ul style="margin:4px 0;padding-left:20px;font-size:12px;">' +
        voices.map(v => '<li>' + v.name + ' (' + v.lang + ')</li>').join('') + '</ul>';
    }
    refreshVoices();
    if (synth && synth.onvoiceschanged !== undefined) synth.onvoiceschanged = refreshVoices;

    function doSpeak(u, label) {
      try { synth.resume(); } catch(e){}
      try { synth.cancel(); } catch(e){}
      u.onstart = () => log('▶ [A-' + label + '] onstart', 'ok');
      u.onend   = () => log('■ [A-' + label + '] onend');
      u.onerror = (e) => log('✗ [A-' + label + '] onerror: ' + (e.error||e.message||e), 'err');
      setTimeout(() => { try{ synth.speak(u); log('📢 [A-' + label + '] speak() called'); }catch(e){log('✗ speak() err:'+e.message,'err');} }, 120);
    }

    function testDefault() {
      if (!synth) return;
      const t = document.getElementById('text').value;
      log('── A-默认 ──');
      doSpeak(new SpeechSynthesisUtterance(t), '默认');
    }
    function testEnglish() {
      if (!synth) return;
      const t = document.getElementById('text').value;
      const eng = voices.find(v => /english/i.test(v.name)) || voices.find(v => /en/i.test(v.lang));
      if (!eng) return testDefault();
      log('── A-英文('+eng.name+') ──');
      const u = new SpeechSynthesisUtterance(t); u.voice=eng; u.lang=eng.lang;
      doSpeak(u, '英文');
    }
    function stopAll() { try{ synth.cancel(); log('已停止'); }catch(e){} }

    // ========== 方式 B：在线 TTS 音频流（和项目代码一致） ==========
    const audioEl = document.getElementById('testAudio');

    function testAudio() {
      const text = document.getElementById('text').value.trim();
      if (!text) { alert('请输入文本'); return; }
      log('── B-TTS音频流 ──');
      // 使用项目后端的 TTS 接口
      const url = '/api/tts?' + new URLSearchParams({ text, lang: 'en-US' });
      log('请求 URL: ' + url);

      audioEl.style.display = '';
      audioEl.src = url;
      audioEl.load();

      audioEl.oncanplay = () => log('✅ [B] 音频就绪，开始播放...', 'ok');
      audioEl.onplay    = () => log('▶ [B] 正在播放（你应该听到声音了！）', 'ok');
      audioEl.onended   = () => log('■ [B] 播放结束');
      audioEl.onerror   = (e) => {
        log('✗ [B] 播放出错: ' + (audioEl.error?.message||e), 'err');
        // 尝试直接 fetch 查看后端返回了什么
        fetch(url).then(r => {
          log('[B-debug] 后端状态码: ' + r.status + ', content-type: ' + r.headers.get('content-type'));
          r.text().then(t => log('[B-debug] 响应内容(前200字): ' + t.slice(0,200)));
        }).catch(e => log('[B-debug] fetch 失败: '+e, 'err'));
      };

      audioEl.play().catch(e => log('✗ [B] play() 被拒绝: '+e.message, 'err'));
    }
  </script>
</body>
</html>
